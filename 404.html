<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <script>
        (function() {
            const lang = localStorage.getItem('rebelo_lang') || 'ar';
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Rebelo</title>
    <meta name="description" content="Rebelo - Page not found." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .error-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px 32px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--brand-light), var(--brand-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(229, 57, 53, 0.3);
        }

        .error-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .error-desc {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto 40px;
            line-height: 1.6;
        }

        /* Hacker Terminal Box */
        .hacker-box {
            margin-top: 40px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--brand);
            border-radius: 8px;
            padding: 24px;
            max-width: 600px;
            width: 100%;
            text-align: left;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            box-shadow: 0 0 30px rgba(229, 57, 53, 0.15);
            position: relative;
            overflow: hidden;
        }

        .hacker-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--brand);
            box-shadow: 0 0 10px var(--brand);
        }

        .hacker-line {
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .hacker-line span.red {
            color: var(--brand-light);
            font-weight: bold;
        }

        .hacker-line span.white {
            color: #fff;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background: var(--brand);
            vertical-align: bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <canvas id="bg-canvas"></canvas>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <span class="logo-dot"></span><span class="logo-r">R</span><span class="logo-rest">ebelo</span>
            </a>
            <div class="nav-links" id="nav-links">
                <a href="register-delivery.html" class="nav-link">
                    <img src="icon_delivery_real.webp" alt="" class="nav-icon"> <span data-i18n="nav_courier">Become a
                        Courier</span>
                </a>
                <a href="register-taxi.html" class="nav-link">
                    <img src="icon_taxi_real.webp" alt="" class="nav-icon"> <span data-i18n="nav_driver">Drive with
                        Us</span>
                </a>
                <a href="register-partner.html" class="nav-link nav-link-cta">
                    <img src="icon_partner_real.webp" alt="" class="nav-icon"> <span data-i18n="nav_partner">Partner
                        with Us</span>
                </a>
                <button id="lang-toggle" class="lang-toggle">🌐 EN | ع</button>
            </div>
            <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
        </div>
        <div class="nav-mobile" id="nav-mobile">
            <a href="register-delivery.html"><img src="icon_delivery_real.webp" alt="" class="nav-icon"> <span
                    data-i18n="nav_courier">Become a Courier</span></a>
            <a href="register-taxi.html"><img src="icon_taxi_real.webp" alt="" class="nav-icon"> <span
                    data-i18n="nav_driver">Drive with Us</span></a>
            <a href="register-partner.html"><img src="icon_partner_real.webp" alt="" class="nav-icon"> <span
                    data-i18n="nav_partner">Partner with Us</span></a>
        </div>
    </nav>

    <!-- 404 Section -->
    <section class="error-section">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-desc">Oops! It seems you've wandered off the map. The page you are looking for doesn't exist or
            has been moved.</p>

        <a href="index.html" class="btn-primary" style="margin-bottom: 20px;">
            ← Back to Safety
        </a>


    </section>

    <script src="i18n.js"></script>
    <script src="main.js"></script>
</body>

</html>
