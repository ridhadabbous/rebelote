name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify secret is set
        run: |
          if [ -z "${{ secrets.WEB3FORMS_KEY }}" ]; then
            echo "❌ ERROR: WEB3FORMS_KEY secret is NOT set in repository secrets."
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          else
            echo "✅ WEB3FORMS_KEY secret is present."
          fi

      - name: Inject Web3Forms key into main.js
        run: |
          echo "📂 Current directory: $(pwd)"
          echo "📄 Files: $(ls)"
          # Perform replacement
          sed -i 's|__WEB3FORMS_KEY__|${{ secrets.WEB3FORMS_KEY }}|g' main.js
          # Verify placeholder is gone
          if grep -q '__WEB3FORMS_KEY__' main.js; then
            echo "❌ ERROR: Placeholder was NOT replaced in main.js!"
            exit 1
          else
            echo "✅ Key injected successfully into main.js"
          fi

      - name: Inject Registration Backend URL
        run: |
          sed -i 's|__REGISTRATION_BACKEND_URL__|${{ secrets.REGISTRATION_BACKEND_URL }}|g' register.js
          if grep -q '__REGISTRATION_BACKEND_URL__' register.js; then
            echo "❌ ERROR: Placeholder was NOT replaced in register.js!"
            exit 1
          else
            echo "✅ Backend URL injected successfully into register.js"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
